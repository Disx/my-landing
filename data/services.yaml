- code: "[ autsorsing ]"
  title: "Абонентское IT-обслуживание"
  text: "Полное сопровождение инфраструктуры по договору: заявки, мониторинг, плановое обслуживание. Предсказуемый бюджет вместо аврального ремонта."

- code: "[ servers ]"
  title: "Серверы и виртуализация"
  text: "Установка, настройка и поддержка серверов, гипервизоров и контейнеров. 1С, файловые хранилища, почта, корпоративные сервисы."

- code: "[ network ]"
  title: "Сети и Wi-Fi"
  text: "Проектирование и настройка локальных сетей, маршрутизаторов и Wi-Fi, VPN для удалённого доступа сотрудников. Стабильный интернет в офисе."

- code: "[ security ]"
  title: "Информационная безопасность"
  text: "Контроль доступа, защита от вирусов и утечек, аудит уязвимостей, политики паролей и обновлений. Снижаем риск простоев и потери данных."

- code: "[ backup ]"
  title: "Резервное копирование"
  text: "Настройка автоматических бэкапов и проверка восстановления. Сбой оборудования или шифровальщик не остановят работу компании."

- code: "[ workplace ]"
  title: "Поддержка рабочих мест"
  text: "Настройка ПК, оргтехники и программ, помощь сотрудникам. Подбор и закупка оборудования под задачи и бюджет."
